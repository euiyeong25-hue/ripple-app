<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIPPLE — 이슈 파급 경제 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --surface:#0e1018; --surface2:#151720;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.12);
  --text:#e2e4ef; --muted:#4a4d62; --muted2:#6a6d82;
  --l0:#f0b429; --l0-bg:rgba(240,180,41,0.08);
  --l1:#e05a2b; --l1-bg:rgba(224,90,43,0.08);
  --l2:#9b59d0; --l2-bg:rgba(155,89,208,0.08);
  --l3:#2196a8; --l3-bg:rgba(33,150,168,0.08);
  --up:#3ecf8e; --down:#f06292;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh}

header{padding:1.1rem 2rem;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem}
.logo-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--l0);margin-left:2px;margin-bottom:2px;box-shadow:0 0 12px var(--l0);animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:1;box-shadow:0 0 12px var(--l0)}50%{opacity:.6;box-shadow:0 0 4px var(--l0)}}
.legend{display:flex;gap:.75rem}
.legend-item{display:flex;align-items:center;gap:.3rem;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted2)}
.legend-dot{width:7px;height:7px;border-radius:50%}

.hero{padding:2.5rem 2rem 1.5rem;max-width:860px;margin:0 auto;text-align:center}
.hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:3px;color:var(--l0);text-transform:uppercase;margin-bottom:.75rem}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.8rem,4vw,3rem);line-height:1.1;margin-bottom:.6rem;letter-spacing:-1px}
.hero h1 span{background:linear-gradient(135deg,var(--l0),var(--l1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:.85rem;color:var(--muted2);line-height:1.7;margin-bottom:2rem;font-weight:300}

.search-box{display:flex;max-width:620px;margin:0 auto 1.25rem;border:1.5px solid var(--border2);border-radius:10px;overflow:hidden;transition:border-color .2s}
.search-box:focus-within{border-color:var(--l0);box-shadow:0 0 0 3px rgba(240,180,41,.1)}
.search-input{flex:1;background:var(--surface2);border:none;padding:.85rem 1.2rem;color:var(--text);font-size:.95rem;font-family:'Noto Sans KR',sans-serif;outline:none}
.search-input::placeholder{color:var(--muted)}
.search-btn{background:var(--l0);color:#000;border:none;padding:0 1.5rem;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:background .2s;white-space:nowrap}
.search-btn:hover{background:#f5c842}
.search-btn:disabled{background:var(--muted);cursor:not-allowed}

.presets{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.preset-chip{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:.28rem .8rem;border-radius:100px;font-size:.75rem;cursor:pointer;transition:all .15s}
.preset-chip:hover{border-color:var(--l0);color:var(--l0);background:var(--l0-bg)}

.main{max-width:860px;margin:0 auto;padding:0 2rem 4rem}

.status-block{border:1px solid var(--border2);border-radius:10px;padding:1rem 1.25rem;display:flex;align-items:center;gap:.85rem;margin-bottom:1rem;background:var(--surface)}
.status-spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--l0);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.status-check{width:18px;height:18px;border-radius:50%;background:var(--up);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#000;flex-shrink:0}
.status-fail{width:18px;height:18px;border-radius:50%;background:var(--down);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#000;flex-shrink:0}
.status-text{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.5px;color:var(--muted2)}
.status-text strong{color:var(--text);font-weight:600}
.status-timer{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted)}

.ripple-chain{display:flex;flex-direction:column}
.issue-block{animation:slideIn .35s ease both;opacity:0}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.connector{display:flex;align-items:center;gap:.75rem;padding:.35rem 0}
.connector-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:1px}
.ripple-card{border-radius:10px;overflow:hidden;border:1px solid var(--border2);background:var(--surface);position:relative;transition:filter .2s}
.ripple-card:hover{filter:brightness(1.04)}
.ripple-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--level-color)}
.card-top{display:flex;align-items:flex-start;gap:.7rem;padding:.9rem 1.1rem .7rem 1.4rem}
.level-badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:600;letter-spacing:1px;padding:.18rem .55rem;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--level-bg);color:var(--level-color);border:1px solid var(--level-color)}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;line-height:1.3;color:var(--text);margin-bottom:.15rem}
.card-source{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted2)}
.card-summary{padding:0 1.1rem .7rem 1.4rem;font-size:.84rem;color:#b0b3c8;line-height:1.7;font-weight:300}
.market-impacts{display:flex;flex-wrap:wrap;gap:.4rem;padding:.65rem 1.1rem .65rem 1.4rem;border-top:1px solid var(--border)}
.impact-tag{display:flex;align-items:center;gap:.3rem;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:.22rem .55rem;font-size:.74rem}
.impact-tag .asset{color:var(--muted2);font-family:'JetBrains Mono',monospace;font-size:.62rem}
.impact-tag .dir{font-weight:700;font-size:.72rem}
.dir.up{color:var(--up)}.dir.down{color:var(--down)}.dir.neu{color:var(--muted2)}
.impact-tag .reason{color:var(--text)}
.watch-section{padding:.65rem 1.1rem .9rem 1.4rem;border-top:1px solid var(--border);background:rgba(255,255,255,.015)}
.watch-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:2px;color:var(--muted);margin-bottom:.35rem}
.watch-text{font-size:.78rem;color:var(--muted2);line-height:1.6}

.issue-sep{display:flex;align-items:center;gap:1rem;margin:1.75rem 0}
.issue-sep-line{flex:1;height:1px;background:var(--border)}
.issue-sep-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:2px;color:var(--muted);white-space:nowrap}

.today-banner{background:linear-gradient(135deg,rgba(240,180,41,.06),rgba(155,89,208,.06));border:1px solid rgba(240,180,41,.2);border-radius:10px;padding:1rem 1.4rem;margin-bottom:1.75rem;animation:slideIn .3s ease both}
.today-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;color:var(--l0);margin-bottom:.4rem}
.today-text{font-size:.88rem;line-height:1.7;color:var(--text);font-weight:300}

.group-label{margin-bottom:.85rem}
.group-label span{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:2px;color:var(--muted2);text-transform:uppercase}

.inline-fail{border:1px solid rgba(240,98,146,.25);border-radius:10px;padding:1rem 1.25rem;background:rgba(240,98,146,.04);display:flex;align-items:center;gap:.85rem;margin-bottom:1rem}
.inline-fail-text{font-size:.82rem;color:var(--muted2);line-height:1.5}
.inline-fail-text strong{color:var(--down);display:block;margin-bottom:.2rem;font-family:'JetBrains Mono',monospace;font-size:.72rem}
.retry-link{color:var(--l0);cursor:pointer;text-decoration:underline;font-size:.78rem}

.empty-wrap{padding:4rem 2rem;text-align:center}
.ripple-visual{margin:0 auto 1.75rem;width:90px;height:90px;position:relative;display:flex;align-items:center;justify-content:center}
.ripple-ring{position:absolute;border-radius:50%;border:1.5px solid var(--l0);animation:rippleExpand 3s ease-out infinite}
.ripple-ring:nth-child(1){width:24px;height:24px;animation-delay:0s}
.ripple-ring:nth-child(2){width:46px;height:46px;animation-delay:.6s;border-color:var(--l1)}
.ripple-ring:nth-child(3){width:68px;height:68px;animation-delay:1.2s;border-color:var(--l2)}
.ripple-ring:nth-child(4){width:90px;height:90px;animation-delay:1.8s;border-color:var(--l3)}
.ripple-center{width:10px;height:10px;border-radius:50%;background:var(--l0);box-shadow:0 0 14px var(--l0);position:relative;z-index:1}
@keyframes rippleExpand{0%{opacity:.8;transform:scale(.8)}100%{opacity:0;transform:scale(1.1)}}
.empty-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:.5rem}
.empty-sub{font-size:.83rem;color:var(--muted2);line-height:1.7}

@media(max-width:600px){
  header{padding:1rem}.legend{display:none}
  .hero{padding:1.75rem 1rem 1.25rem}.main{padding:0 1rem 3rem}
  .search-box{flex-direction:column;border-radius:8px}.search-btn{padding:.7rem}
}
</style>
</head>
<body>
<header>
  <div class="logo">RIPPLE<span class="logo-dot"></span></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--l0)"></div>핵심이슈</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--l1)"></div>1차파급</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--l2)"></div>2차파급</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--l3)"></div>3차파급</div>
  </div>
</header>

<div class="hero">
  <div class="hero-eyebrow">// Issue → Ripple → Market Impact</div>
  <h1>이슈가 시장에<br><span>파급되는 흐름</span>을 읽다</h1>
  <p class="hero-sub">글로벌 이슈를 입력하면 AI가 경제·시장으로 연쇄 파급되는 고리를 단계별로 분석합니다</p>
  <div class="search-box">
    <input class="search-input" id="issueInput" type="text"
      placeholder="이슈 입력 (예: 중동사태, 미국 관세, 일본 금리인상...)"
      onkeydown="if(event.key==='Enter') analyze()">
    <button class="search-btn" id="analyzeBtn" onclick="analyze()">분석 →</button>
  </div>
  <div class="presets">
    <span class="preset-chip" onclick="setPreset('미국 관세 전쟁')">🇺🇸 미국 관세 전쟁</span>
    <span class="preset-chip" onclick="setPreset('중동 지정학 긴장')">🛢️ 중동 지정학</span>
    <span class="preset-chip" onclick="setPreset('미 연준 금리 결정')">🏦 연준 금리</span>
    <span class="preset-chip" onclick="setPreset('중국 경기 침체')">🇨🇳 중국 침체</span>
    <span class="preset-chip" onclick="setPreset('AI 빅테크 실적')">🤖 AI 빅테크</span>
    <span class="preset-chip" onclick="setPreset('엔화 약세')">🇯🇵 엔화 약세</span>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="empty-wrap">
    <div class="ripple-visual">
      <div class="ripple-ring"></div><div class="ripple-ring"></div>
      <div class="ripple-ring"></div><div class="ripple-ring"></div>
      <div class="ripple-center"></div>
    </div>
    <div class="empty-title">이슈를 던지세요</div>
    <p class="empty-sub">글로벌 이슈를 입력하면<br>경제·시장으로 파급되는 연쇄 고리를 분석합니다</p>
  </div>
</div>

<script>
const LEVEL_META={
  0:{label:'CORE ISSUE',color:'var(--l0)',bg:'var(--l0-bg)'},
  1:{label:'1차 파급',color:'var(--l1)',bg:'var(--l1-bg)'},
  2:{label:'2차 파급',color:'var(--l2)',bg:'var(--l2-bg)'},
  3:{label:'3차 파급',color:'var(--l3)',bg:'var(--l3-bg)'},
};
const CONN_LABELS=['','직접 파급','연쇄 확산','2차 영향'];
const RAW=['#f0b429','#e05a2b','#9b59d0','#2196a8'];

function setPreset(v){document.getElementById('issueInput').value=v;analyze();}
function dc(d){if(!d)return'neu';if(['up','positive','상승','호재'].includes(d))return'up';if(['down','negative','하락','악재'].includes(d))return'down';return'neu';}
function da(d){const c=dc(d);return c==='up'?'▲':c==='down'?'▼':'─';}

function impactHTML(impacts){
  if(!impacts||!impacts.length)return'';
  return`<div class="market-impacts">${impacts.map(i=>`<div class="impact-tag"><span class="asset">${i.asset||''}</span><span class="dir ${dc(i.direction)}">${da(i.direction)}</span><span class="reason">${i.reason||''}</span></div>`).join('')}</div>`;
}

function cardHTML(node,delay){
  const lv=Math.min(node.level??0,3),m=LEVEL_META[lv];
  return`<div class="issue-block" style="animation-delay:${delay}s"><div class="ripple-card" style="--level-color:${m.color};--level-bg:${m.bg}"><div class="card-top"><span class="level-badge" style="--level-color:${m.color};--level-bg:${m.bg}">${m.label}</span><div><div class="card-title">${node.title||''}</div>${node.source?`<div class="card-source">${node.source}</div>`:''}</div></div><div class="card-summary">${node.summary||''}</div>${impactHTML(node.marketImpacts)}${node.watchPoint?`<div class="watch-section"><div class="watch-label">// 주목 포인트</div><div class="watch-text">${node.watchPoint}</div></div>`:''}</div></div>`;
}

function connHTML(fl,tl){
  return`<div class="connector"><div style="display:flex;flex-direction:column;align-items:center;padding-left:11px"><div style="width:2px;height:22px;background:linear-gradient(180deg,${RAW[Math.min(fl,3)]},${RAW[Math.min(tl,3)]})"></div><div style="color:${RAW[Math.min(tl,3)]};font-size:.58rem">▼</div></div><span class="connector-label">${CONN_LABELS[Math.min(tl,3)]||''}</span></div>`;
}

function chainHTML(chain,base){
  return`<div class="ripple-chain">${(chain||[]).map((n,i)=>{const lv=n.level??i,pl=i>0?(chain[i-1].level??i-1):lv;return(i>0?connHTML(pl,lv):'')+cardHTML(n,base+i*0.1);}).join('')}</div>`;
}

function addStatus(id,label){
  const el=document.createElement('div');
  el.className='status-block';el.id='sb-'+id;
  el.innerHTML<`<div class="status-spinner"></div><div class="status-text"><strong>${label}</strong> 웹 검색 + AI 분석 중...</div><div class="status-timer" id="st-${id}">0s</div>`;
  document.getElementById('mainArea').appendChild(el);
  let s=0;const t=setInterval(()=>{s++;const e=document.getElementById('st-'+id);if(e)e.textContent=s+'s';else clearInterval(t);},1000);
  return t;
}

function resolveStatus(id,ok,msg=''){
  const el=document.getElementById('sb-'+id);if(!el)return;
  el.innerHTML=ok
    ?`<div class="status-check">✓</div><div class="status-text"><strong style="color:var(--up)">${msg}</strong></div>`
    :`<div class="status-fail">✕</div><div class="status-text"><strong style="color:var(--down)">실패</strong> ${msg}</div>`;
}

function insert(html){document.getElementById('mainArea').insertAdjacentHTML('beforeend',html);}

let lastIssue='';

async function callAPI(issue,pathDesc){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),45000);
  try{
    const r=await fetch('/api/analyze',{
      method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({issue,pathDesc})
    });
    clearTimeout(tid);
    if(!r.ok){const e=await r.json();throw new Error(e.error||'서버 오류');}
    return await r.json();
  }catch(e){clearTimeout(tid);if(e.name==='AbortError')throw new Error('45초 초과');throw e;}
}

async function analyze(){
  const issue=document.getElementById('issueInput').value.trim();
  if(!issue)return;
  lastIssue=issue;
  const btn=document.getElementById('analyzeBtn');
  btn.disabled=true;btn.textContent='분석 중...';
  document.getElementById('mainArea').innerHTML='';
  const today=new Date().toLocaleDateString('ko-KR');

  // 1차: 공급·원자재
  const t1=addStatus('r1','공급·원자재 파급 분석');
  try{
    const r1=await callAPI(issue,'파급경로1: 공급·원자재·에너지 측면. level0=핵심이슈,level1~3=단계별파급.');
    clearInterval(t1);resolveStatus('r1',true,'공급·원자재 완료');
    if(r1.todayContext)insert(`<div class="today-banner"><div class="today-label">// 오늘 현황 — ${today}</div><div class="today-text">${r1.todayContext}</div></div>`);
    insert(`<div class="group-label"><span>// ${r1.groupTitle||'공급·원자재 경로'}</span></div>`);
    insert(chainHTML(r1.chain,0));
  }catch(e){clearInterval(t1);resolveStatus('r1',false,e.message);}

  insert(`<div class="issue-sep"><div class="issue-sep-line"></div><div class="issue-sep-label">다른 파급 경로</div><div class="issue-sep-line"></div></div>`);

  // 2차: 금융시장
  const t2=addStatus('r2','금융시장 파급 분석');
  try{
    const r2=await callAPI(issue,'파급경로2: 금융시장·통화·주식·채권 측면. level0=핵심이슈,level1~3=단계별파급.');
    clearInterval(t2);resolveStatus('r2',true,'금융시장 완료');
    insert(`<div class="group-label" style="margin-top:.85rem"><span>// ${r2.groupTitle||'금융시장 경로'}</span></div>`);
    insert(chainHTML(r2.chain,5));
  }catch(e){
    clearInterval(t2);resolveStatus('r2',false,e.message);
    insert(`<div class="inline-fail"><div style="font-size:1.1rem">⚠️</div><div class="inline-fail-text"><strong>금융시장 파급 분석 실패</strong>${e.message} — <span class="retry-link" onclick="retryR2()">다시 시도</span></div></div>`);
  }

  btn.disabled=false;btn.textContent='분석 →';
}

async function retryR2(){
  document.querySelectorAll('.inline-fail').forEach(e=>e.remove());
  document.getElementById('sb-r2')?.remove();
  const t2=addStatus('r2','금융시장 파급 재시도');
  try{
    const r2=await callAPI(lastIssue,'파급경로2: 금융시장·통화·주식·채권 측면. level0=핵심이슈,level1~3=단계별파급.');
    clearInterval(t2);resolveStatus('r2',true,'금융시장 완료');
    insert(`<div class="group-label" style="margin-top:.85rem"><span>// ${r2.groupTitle||'금융시장 경로'}</span></div>`);
    insert(chainHTML(r2.chain,5));
  }catch(e){
    clearInterval(t2);resolveStatus('r2',false,e.message);
    insert(`<div class="inline-fail"><div style="font-size:1.1rem">⚠️</div><div class="inline-fail-text"><strong>금융시장 파급 분석 실패</strong>${e.message} — <span class="retry-link" onclick="retryR2()">다시 시도</span></div></div>`);
  }
}
</script>
</body>
</html>
